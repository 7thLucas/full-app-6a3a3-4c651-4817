                  - button:
                    - generic: Is this just another no-code app builder?
                    - generic:
                      - img
                  - generic:
                    - paragraph: No. QB ships AI services that run your operations — not tools you have to learn to use. The app is the surface; the service is what runs.
                - generic:
                  - button:
                    - generic: How is QB different from Sierra or Decagon?
                    - generic:
                      - img
                  - paragraph: Sierra and Decagon are enterprise platforms with $100K+ contracts and 6-month deployments. QB serves the SMB and mid-market service operator tier. Same outcome; different audience and price.
                - generic:
                  - button:
                    - generic: What's "Fast Track"?
                    - generic:
                      - img
                  - paragraph: When AI hits an edge case, our engineers finish the job inside your live app. Billed at $130 per Story Point. Pay only for what you use.
                - generic:
                  - button:
                    - generic: Can I describe my service in plain language?
                    - generic:
                      - img
                  - paragraph: Yes. That's the whole point. Tell QB what you need — workflow, users, data — in conversation. We turn it into a working app.
                - generic:
                  - button:
                    - generic: Do I need to know how to code?
                    - generic:
                      - img
                  - paragraph: No. You describe what you need in plain language — like talking to a colleague. Our AI handles everything technical. If you can explain your business, you can use QuantumByte.
                - generic:
                  - button:
